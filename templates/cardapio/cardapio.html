<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio — {{ restaurante.nome }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">
    <h1 class="text-center mb-1">{{ restaurante.nome }}</h1>
    <p class="text-center text-muted mb-4">Mesa {{ mesa }}</p>

    <div class="row g-3">
        {% for item in itens %}
        <div class="col-12">
            <div class="card shadow-sm">
               {% if item.foto %}
                    <img src="{{ item.foto.url }}" class="card-img-top" alt="{{ item.nome }}"
                         style="height: 180px; object-fit: cover;">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ item.nome }}</h5>
                    <p class="card-text text-muted">{{ item.descricao }}</p>
                    {% if item.restricoes %}
                        <small class="text-danger">⚠️ {{ item.restricoes }}</small>
                    {% endif %}
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="fw-bold fs-5">R$ {{ item.preco }}</span>
                        <button class="btn btn-success btn-sm">+ Adicionar</button>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
            <p class="text-center text-muted">Nenhum item disponível no momento.</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
