<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center">
    <h1>Pedido Confirmado!</h1>
    <p class="text-muted">Mesa {{ mesa }} — Pedido #{{ pedido.id }}</p>
    <p>Seu pedido foi enviado para a cozinha e será preparado em breve.</p>
    <a href="{% url 'cardapio' restaurante_id=restaurante_id mesa=mesa %}"
       class="btn btn-outline-success mt-3">Fazer novo pedido</a>
</div>
</body>
</html>
