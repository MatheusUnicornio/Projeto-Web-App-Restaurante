<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0e0d;
            --bg-card: #1a1815;
            --amber: #e8a045;
            --amber-dim: rgba(232,160,69,0.15);
            --text: #f0ebe4;
            --text-muted: #8a8076;
            --border: rgba(255,255,255,0.07);
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            text-align: center;
            max-width: 360px;
            width: 100%;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 88px;
            height: 88px;
            background: var(--amber-dim);
            border: 2px solid var(--amber);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 24px;
            animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }

        @keyframes pop {
            from { transform: scale(0); }
            to   { transform: scale(1); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-around;
        }

        .info-item label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: block;
            margin-bottom: 4px;
        }

        .info-item span {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 600;
            color: var(--amber);
        }

        .btn {
            display: block;
            background: var(--amber-dim);
            border: 1px solid rgba(232,160,69,0.3);
            color: var(--amber);
            text-decoration: none;
            border-radius: var(--radius);
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:active { background: rgba(232,160,69,0.25); }
    </style>
</head>
<body>
<div class="container">
    <div class="icon-circle">✓</div>
    <h1>Pedido Confirmado!</h1>
    <p class="subtitle">Seu pedido foi recebido e<br>será preparado em breve.</p>

    <div class="info-card">
        <div class="info-item">
            <label>Pedido</label>
            <span>#{{ pedido.id }}</span>
        </div>
        <div class="info-item">
            <label>Mesa</label>
            <span>{{ mesa }}</span>
        </div>
    </div>

    <a href="{% url 'cardapio' restaurante_id=restaurante_id mesa=mesa %}"
       class="btn">+ Adicionar mais itens</a>
</div>
</body>
</html>
