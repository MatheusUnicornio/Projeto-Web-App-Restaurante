<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento não aprovado</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#0f0e0d; --text:#f0ebe4; --text-muted:#8a8076; --red:#e05454; --red-dim:rgba(224,84,84,0.12); --radius:16px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .container { text-align:center; max-width:360px; width:100%; animation:fadeUp 0.5s ease both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
        .icon-circle { width:88px; height:88px; background:var(--red-dim); border:2px solid var(--red); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px; margin:0 auto 24px; }
        h1 { font-family:'Playfair Display',serif; font-size:28px; margin-bottom:8px; }
        .subtitle { color:var(--text-muted); font-size:15px; line-height:1.5; margin-bottom:32px; }
        .btn { display:block; background:var(--red-dim); border:1px solid rgba(224,84,84,0.3); color:var(--red); text-decoration:none; border-radius:var(--radius); padding:16px; font-size:15px; font-weight:600; }
    </style>
</head>
<body>
<div class="container">
    <div class="icon-circle">✕</div>
    <h1>Pagamento não aprovado</h1>
    <p class="subtitle">Não foi possível processar<br>seu pagamento. Tente novamente.</p>
    <a href="/" class="btn">Tentar novamente</a>
</div>
</body>
</html>
